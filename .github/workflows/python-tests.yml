name: Python Tests
on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.12', '3.14']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pyROX
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest nbmake

    - name: Run tests
      run: |
        pytest -W ignore::pyROX.utils.pyROXWarning
        pytest -W ignore::pyROX.utils.pyROXWarning --nbmake docs/notebooks/*.ipynb